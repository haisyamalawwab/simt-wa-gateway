version: '3.8'

services:
  wa-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simt-wa-gateway
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./sessions:/app/sessions
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - gateway-net

networks:
  gateway-net:
    driver: bridge
