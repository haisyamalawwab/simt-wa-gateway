app = "simt-wa-gateway"
primary_region = "sin"  # Singapore — terdekat untuk Indonesia

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8081"
  NODE_ENV = "production"

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "wa_sessions"
  destination = "/app/sessions"

[[services]]
  protocol = "tcp"
  internal_port = 8081

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.tcp_checks]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "get"
    path = "/api/health"
